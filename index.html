    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blush: #F9C8D9;
      --rose:  #E8729A;
      --deep:  #C0446E;
      --petal: #FDE8F0;
      --ink:   #3D1A28;
      --white: #FFFAFC;
    }

    body {
      min-height: 100vh;
      background: var(--petal);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;

      box-shadow: 0 8px 40px rgba(192,68,110,0.25);
      animation: rise 0.9s cubic-bezier(.22,1,.36,1) both;
      overflow: hidden;
